name: Cross-Platform Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: iot_edge_sentinel_linux_x86_64
            compiler: gcc
            ext: ""
          - os: windows-latest
            artifact_name: iot_edge_sentinel_windows_x86_64.exe
            compiler: gcc
            ext: ".exe"
          - os: macos-latest
            artifact_name: iot_edge_sentinel_macos_x86_64
            compiler: clang
            ext: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile C Code (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p build
          ${{ matrix.compiler }} -O3 src/*.c -o build/${{ matrix.artifact_name }}

      - name: Compile C Code (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir build
          gcc -O3 src/*.c -o build/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
