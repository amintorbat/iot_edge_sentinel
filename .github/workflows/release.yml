name: Cross-Platform Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: iot_edge_sentinel_linux_x64
            compiler: gcc
          - os: macos-latest
            artifact_name: iot_edge_sentinel_macos_x64
            compiler: clang
          - os: windows-latest
            artifact_name: iot_edge_sentinel_windows_x64.exe
            compiler: gcc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Build Directory
        run: mkdir build

      - name: Compile C Source (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.compiler }} -O3 src/*.c -I include -o build/${{ matrix.artifact_name }}

      - name: Compile C Source (Windows)
        if: matrix.os == 'windows-latest'
        run: ${{ matrix.compiler }} -O3 src/*.c -I include -o build/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
